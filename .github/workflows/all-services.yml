# =============================================================
# .github/workflows/all-services.yml
# Master CI/CD — builds/tests/deploys all 5 services
# =============================================================

name: Finance Platform — Full CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: production-cluster
  K8S_NAMESPACE: finance

jobs:
  # ── Detect which services changed ──────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      upload: ${{ steps.filter.outputs.upload }}
      processing: ${{ steps.filter.outputs.processing }}
      analytics: ${{ steps.filter.outputs.analytics }}
      notification: ${{ steps.filter.outputs.notification }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'apps/auth-service/**'
              - 'libs/**'
            upload:
              - 'apps/upload-service/**'
              - 'libs/**'
            processing:
              - 'apps/processing-service/**'
              - 'libs/**'
            analytics:
              - 'apps/analytics-service/**'
              - 'libs/**'
            notification:
              - 'apps/notification-service/**'
              - 'libs/**'
            infra:
              - 'infrastructure/**'

  # ── Test all changed services ───────────────────────────────
  test:
    name: Test
    needs: detect-changes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: financedb_test
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --frozen-lockfile
      - run: npx prisma generate --schema=libs/database/prisma/schema.prisma
      - run: npx prisma migrate deploy --schema=libs/database/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://admin:testpassword@localhost:5432/financedb_test
      - name: Run tests
        run: npx nx run-many --target=test --all --passWithNoTests --parallel=3
        env:
          DATABASE_URL: postgresql://admin:testpassword@localhost:5432/financedb_test
          JWT_ACCESS_SECRET: test-access-secret-min-32-chars-long-ok
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-long-ok
          AWS_REGION: ap-south-1
          AWS_S3_BUCKET: test-bucket
          AWS_SQS_PROCESSING_URL: http://localhost:4566/000000000000/test-queue
          ANTHROPIC_API_KEY: ''
          REDIS_URL: redis://localhost:6379

  # ── Build & Push all images ──────────────────────────────────
  build-and-push:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set image tag
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - name: Build & Push all services
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          TAG=${{ steps.meta.outputs.tag }}
          for SVC in auth-service upload-service processing-service analytics-service notification-service; do
            echo "Building $SVC..."
            docker buildx build \
              --file apps/$SVC/Dockerfile \
              --tag $REGISTRY/$SVC:$TAG \
              --tag $REGISTRY/$SVC:latest \
              --cache-from type=gha,scope=$SVC \
              --cache-to type=gha,mode=max,scope=$SVC \
              --push .
          done
      - name: Scan images for vulnerabilities
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          TAG=${{ steps.meta.outputs.tag }}
          for SVC in auth-service upload-service processing-service analytics-service notification-service; do
            echo "Scanning $SVC..."
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image \
              --exit-code 1 \
              --ignore-unfixed \
              --severity CRITICAL \
              $REGISTRY/$SVC:$TAG || true  # Don't block on scan (report only)
          done

  # ── Deploy all services ─────────────────────────────────────
  deploy:
    name: Deploy to EKS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/production-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
      - name: Apply all manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/ingress.yaml
          for SVC in auth-service upload-service processing-service analytics-service notification-service; do
            kubectl apply -f infrastructure/k8s/$SVC/ || true
          done
      - name: Update all image tags
        run: |
          REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          TAG=${{ needs.build-and-push.outputs.image-tag }}
          for SVC in auth-service upload-service processing-service analytics-service notification-service; do
            kubectl set image deployment/$SVC $SVC=$REGISTRY/$SVC:$TAG -n ${{ env.K8S_NAMESPACE }} || true
          done
      - name: Wait for rollouts
        run: |
          for SVC in auth-service upload-service analytics-service notification-service; do
            kubectl rollout status deployment/$SVC -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          done
      - name: Verify all pods running
        run: kubectl get pods -n ${{ env.K8S_NAMESPACE }}
