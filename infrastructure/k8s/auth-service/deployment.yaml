# =============================================================
# infrastructure/k8s/auth-service/deployment.yaml
# Auth Service Kubernetes manifests
# Apply: kubectl apply -f infrastructure/k8s/auth-service/
# =============================================================

# ── Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: finance
  labels:
    app: auth-service
    version: "1.0"
spec:
  # Start with 2 replicas for HA — HPA will scale up/down
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Spin up 1 extra pod during update
      maxUnavailable: 0  # Never take down a pod until new one is healthy
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        # Prometheus scrapes metrics from this pod
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      # Service account with IRSA for AWS access (set up in Terraform)
      serviceAccountName: auth-service-sa

      # Graceful shutdown: wait 30s for in-flight requests
      terminationGracePeriodSeconds: 30

      # Anti-affinity: spread pods across different nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [auth-service]
                topologyKey: kubernetes.io/hostname

      containers:
        - name: auth-service
          # Image built by CI/CD pipeline, tagged with git SHA
          image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http

          # Startup probe: allow extra time for cold starts and Prisma migrations.
          # Kubernetes will NOT start liveness/readiness probes until this succeeds.
          # Budget: 10s × 30 attempts = 300 s max before the container is killed.
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5   # Give the app 5 s to respond before counting as failure

          # Load secrets from K8s Secret (synced from AWS Secrets Manager via ESO)
          envFrom:
            - secretRef:
                name: auth-service-secrets

          # Additional non-secret env vars
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: SERVICE_NAME
              value: "auth-service"
            - name: POD_NAME          # Useful for tracing/logging
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          # Resource limits — right-size for your actual load
          resources:
            requests:
              cpu: 100m      # 0.1 CPU cores guaranteed
              memory: 128Mi  # 128MB RAM guaranteed
            limits:
              cpu: 500m      # Max 0.5 CPU cores
              memory: 512Mi  # Max 512MB RAM

          # Readiness Probe: Kubernetes stops routing traffic to this pod when it fails.
          # The startupProbe above already ensures the app is fully booted before this
          # probe fires, so initialDelaySeconds only adds a small buffer after startup.
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3001
            initialDelaySeconds: 5   # Short buffer after startupProbe succeeds
            periodSeconds: 10        # Check every 10 s
            failureThreshold: 3      # Mark unready after 3 consecutive failures (30 s)
            successThreshold: 1      # Re-add to LB after 1 success
            timeoutSeconds: 5        # DB SELECT 1 must complete within 5 s

          # Liveness Probe: Kubernetes RESTARTS the container when this fails.
          # IMPORTANT: only probe /health (liveness), never /health/ready (readiness).
          # A failed DB should make the pod unready, NOT trigger a restart loop.
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 10  # Short buffer; startupProbe already handled cold start
            periodSeconds: 15        # Check every 15 s — less aggressive than readiness
            failureThreshold: 3      # Restart only after 3 missed beats (45 s)
            timeoutSeconds: 5        # Simple in-process check; 5 s is generous

          lifecycle:
            # Graceful shutdown: stop accepting requests, finish current ones
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      # Security context — container can't write to filesystem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
---
# ── Service ───────────────────────────────────────────────────
# Internal cluster networking — other pods reach auth-service via this
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: finance
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 80          # Other services call port 80
      targetPort: 3001  # Routes to container port 3001
      protocol: TCP
      name: http
  type: ClusterIP  # Internal only — exposed via Ingress
---
# ── Horizontal Pod Autoscaler ─────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: finance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2   # Always run at least 2 for HA
  maxReplicas: 10  # Scale up to 10 under load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 60s before scaling up
    scaleDown:
      stabilizationWindowSeconds: 300 # Wait 5min before scaling down (prevents flapping)
