# =============================================================
# infrastructure/k8s/auth-service/secrets.yaml
# External Secrets Operator syncs AWS Secrets Manager → K8s Secrets
# =============================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h   # Re-sync every hour

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: auth-service-secrets  # K8s Secret name to create
    creationPolicy: Owner

  # Map AWS Secrets Manager keys → K8s Secret keys
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: production/finance-platform/db
        property: url

    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: production/finance-platform/jwt
        property: accessSecret

    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: production/finance-platform/jwt
        property: refreshSecret

    - secretKey: REDIS_URL
      remoteRef:
        key: production/finance-platform/redis
        property: url
