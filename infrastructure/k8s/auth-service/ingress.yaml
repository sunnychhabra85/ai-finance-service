# =============================================================
# infrastructure/k8s/auth-service/ingress.yaml
# AWS ALB routes external traffic to auth-service
# Requires: AWS Load Balancer Controller installed in EKS
# =============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service-ingress
  namespace: finance
  annotations:
    # ── ALB annotations ──────────────────────────────────────
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip  # Route directly to pods

    # ── TLS ───────────────────────────────────────────────────
    # Replace with your ACM certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:123456789012:certificate/YOUR-CERT-ARN
    alb.ingress.kubernetes.io/ssl-redirect: '443'     # Redirect HTTP → HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'

    # ── Security headers ───────────────────────────────────────
    alb.ingress.kubernetes.io/load-balancer-attributes: |
      routing.http.drop_invalid_header_fields.enabled=true

    # ── Health check ──────────────────────────────────────────
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'

    # ── WAF (optional but recommended) ────────────────────────
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:...

spec:
  rules:
    - host: api.yourdomain.com  # Replace with your domain
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80

          # Add paths for other services as you build them:
          # - path: /api/v1/upload
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: upload-service
          #       port:
          #         number: 80
