# =============================================================
# infrastructure/k8s/upload-service/secrets.yaml
# External Secrets Operator syncs AWS Secrets Manager → K8s
# =============================================================

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: upload-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: upload-service-secrets
    creationPolicy: Owner
  data:
    # Shared with auth-service — same JWT secret for stateless validation
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: production/finance-platform/jwt
        property: accessSecret

    - secretKey: DATABASE_URL
      remoteRef:
        key: production/finance-platform/db
        property: url

    # Upload-service-specific secrets
    - secretKey: AWS_S3_BUCKET
      remoteRef:
        key: production/finance-platform/upload
        property: s3Bucket

    - secretKey: AWS_SQS_PROCESSING_URL
      remoteRef:
        key: production/finance-platform/upload
        property: sqsUrl

    - secretKey: AWS_REGION
      remoteRef:
        key: production/finance-platform/upload
        property: awsRegion
