# =============================================================
# infrastructure/k8s/upload-service/deployment.yaml
# Upload Service Kubernetes manifests
# Apply: kubectl apply -f infrastructure/k8s/upload-service/
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-service
  namespace: finance
  labels:
    app: upload-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: upload-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: upload-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      # IRSA: gives this pod S3 + SQS + Secrets Manager access only
      serviceAccountName: upload-service-sa

      terminationGracePeriodSeconds: 30

      # Spread pods across different nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [upload-service]
                topologyKey: kubernetes.io/hostname

      containers:
        - name: upload-service
          image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/upload-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              name: http

          envFrom:
            - secretRef:
                name: upload-service-secrets

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3002"
            - name: SERVICE_NAME
              value: "upload-service"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: upload-service
  namespace: finance
  labels:
    app: upload-service
spec:
  selector:
    app: upload-service
  ports:
    - port: 80
      targetPort: 3002
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-service-hpa
  namespace: finance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
