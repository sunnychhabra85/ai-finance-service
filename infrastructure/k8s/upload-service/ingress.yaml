# =============================================================
# infrastructure/k8s/upload-service/ingress.yaml
# Adds /api/v1/upload routes to the ALB ingress
#
# NOTE: If you have a single ingress resource in auth-service/ingress.yaml,
# add the upload paths to that file instead of creating a new ingress.
# Having multiple Ingress resources for the same host with the same
# ingress class will cause conflicts with ALB.
#
# RECOMMENDED: Use the combined ingress below or add to existing ingress.
# =============================================================

# OPTION A: Standalone ingress (use if auth-service ingress is separate per service)
# apiVersion: networking.k8s.io/v1
# kind: Ingress
# metadata:
#   name: upload-service-ingress
#   namespace: finance
#   annotations:
#     kubernetes.io/ingress.class: alb
#     alb.ingress.kubernetes.io/group.name: finance-platform  # Groups with auth ingress!
#     alb.ingress.kubernetes.io/scheme: internet-facing
#     alb.ingress.kubernetes.io/target-type: ip
