#     alb.ingress.kubernetes.io/ssl-redirect: '443'
# spec:
#   rules:
#     - host: api.yourdomain.com
#       http:
#         paths:
#           - path: /api/v1/upload
#             pathType: Prefix
#             backend:
#               service:
#                 name: upload-service
#                 port:
#                   number: 80

# =============================================================
# OPTION B: Combined ingress for ALL services (RECOMMENDED)
# Replace infrastructure/k8s/auth-service/ingress.yaml with this
# =============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-platform-ingress
  namespace: finance
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:123456789012:certificate/YOUR-CERT-ARN
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    # Rate limiting at ALB level (WAF rule)
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:...
spec:
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          # ── Auth Service ─────────────────────────────────────
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80

          # ── Upload Service ───────────────────────────────────
          - path: /api/v1/upload
            pathType: Prefix
            backend:
              service:
                name: upload-service
                port:
                  number: 80

          # ── Analytics Service (add when ready) ───────────────
          # - path: /api/v1/analytics
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: analytics-service
          #       port:
          #         number: 80

          # ── AI Chatbot Service (add when ready) ──────────────
          # - path: /api/v1/chat
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: analytics-service
          #       port:
          #         number: 80
