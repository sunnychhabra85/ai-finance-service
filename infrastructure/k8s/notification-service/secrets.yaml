# infrastructure/k8s/notification-service/secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: notification-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: notification-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: production/finance-platform/db
        property: url
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: production/finance-platform/jwt
        property: accessSecret
