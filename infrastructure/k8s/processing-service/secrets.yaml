# infrastructure/k8s/processing-service/secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: processing-service-secrets
  namespace: finance
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: processing-service-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: production/finance-platform/db
        property: url
    - secretKey: AWS_REGION
      remoteRef:
        key: production/finance-platform/upload
        property: awsRegion
    - secretKey: AWS_S3_BUCKET
      remoteRef:
        key: production/finance-platform/upload
        property: s3Bucket
    - secretKey: AWS_SQS_PROCESSING_URL
      remoteRef:
        key: production/finance-platform/upload
        property: sqsUrl
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: production/finance-platform/ai
        property: anthropicApiKey
