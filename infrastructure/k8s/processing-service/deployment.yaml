# infrastructure/k8s/processing-service/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
  namespace: finance
  labels:
    app: processing-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processing-service
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels:
        app: processing-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
    spec:
      serviceAccountName: processing-service-sa
      terminationGracePeriodSeconds: 60  # Allow in-flight OCR to finish
      containers:
        - name: processing-service
          image: 014071048720.dkr.ecr.ap-south-1.amazonaws.com/processing-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: processing-service-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: SQS_CONCURRENCY
              value: "3"
          resources:
            requests: { cpu: 200m, memory: 256Mi }  # OCR is CPU-intensive
            limits: { cpu: 1000m, memory: 1Gi }
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 3003 }
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 3003 }
            initialDelaySeconds: 30
            periodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: processing-service
  namespace: finance
spec:
  selector:
    app: processing-service
  ports:
    - port: 80
      targetPort: 3003
  type: ClusterIP
---
